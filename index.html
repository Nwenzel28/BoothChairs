<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gale-Shapley Matching Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f3f4f6; color: #1f2937; line-height: 1.5; }
        .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; }
        h1 { margin-top: 0; color: #111827; }
        h2 { border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; margin-top: 0; }
        .form-group { margin-bottom: 20px; padding: 16px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; }
        input[type="file"] { display: block; width: 100%; }
        .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #10b981; margin-top: 16px; }
        .btn-secondary:hover { background: #059669; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        .error { color: #dc2626; font-weight: bold; padding: 12px; background: #fee2e2; border-radius: 6px; margin-top: 16px; display: none; }
        
        /* New styles for the audit log */
        .log-container { background: #1f2937; color: #10b981; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; margin-top: 24px; display: none; }
        .log-entry { margin-bottom: 4px; }
        .log-swap { color: #f59e0b; }
        .log-reject { color: #ef4444; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Gale-Shapley Matching Engine</h1>
        <p>Upload your data to run the placement algorithm.</p>
        
        <div class="form-group">
            <label>1. Candidates CSV</label>
            <input type="file" id="candidatesCsv" accept=".csv">
        </div>

        <div class="form-group">
            <label>2. Roles & Rankings CSV</label>
            <input type="file" id="rolesCsv" accept=".csv">
        </div>

        <button class="btn" onclick="runAlgorithm()">Run Algorithm</button>
        <div id="errorMessage" class="error"></div>
        
        <div id="auditLog" class="log-container"></div>
    </div>

    <div class="card" id="resultsCard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Match Results</h2>
            <button class="btn btn-secondary" onclick="exportResults()">Download Final Matches (CSV)</button>
        </div>
        
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Role ID</th>
                    <th>Role Name</th>
                    <th>Matched Candidate(s)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let finalCandidates = {};
        let finalRoles = {};

        function parseCSV(text) {
            const result = [];
            const rows = text.split(/\r?\n/);
            if (rows.length === 0) return result;

            const splitCSVRow = (str) => {
                const arr = [];
                let quote = false; let cell = '';
                for (let i = 0; i < str.length; i++) {
                    let char = str[i];
                    if (char === '"' && str[i+1] === '"') { cell += '"'; i++; } 
                    else if (char === '"') { quote = !quote; }
                    else if (char === ',' && !quote) { arr.push(cell.trim()); cell = ''; }
                    else { cell += char; }
                }
                arr.push(cell.trim());
                return arr;
            };

            const headers = splitCSVRow(rows[0]);
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const values = splitCSVRow(rows[i]);
                const row = {};
                headers.forEach((header, index) => { row[header] = values[index] || ''; });
                result.push(row);
            }
            return result;
        }

        function readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = e => reject("Error reading file.");
                reader.readAsText(file);
            });
        }

        async function runAlgorithm() {
            document.getElementById('errorMessage').style.display = 'none';
            const logContainer = document.getElementById('auditLog');
            logContainer.innerHTML = '<div style="color:white; margin-bottom:8px; font-weight:bold;">--- ALGORITHM ENGINE STARTED ---</div>';
            logContainer.style.display = 'block';

            const candFile = document.getElementById('candidatesCsv').files[0];
            const roleFile = document.getElementById('rolesCsv').files[0];

            if (!candFile || !roleFile) {
                document.getElementById('errorMessage').textContent = "Please upload both CSV files.";
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }

            try {
                const candData = parseCSV(await readFile(candFile));
                const roleData = parseCSV(await readFile(roleFile));
                executeGaleShapley(candData, roleData, logContainer);
            } catch (err) {
                document.getElementById('errorMessage').textContent = "System Error: " + err;
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function executeGaleShapley(candData, roleData, logContainer) {
            let candidates = {};
            candData.forEach(c => {
                if(!c.CandidateID) return;
                candidates[c.CandidateID] = {
                    id: c.CandidateID,
                    name: c.Name || c.CandidateID,
                    preferences: [c.Pref1, c.Pref2, c.Pref3, c.Pref4, c.Pref5, c.Pref6].filter(Boolean),
                    currentMatch: null
                };
            });

            let roles = {};
            roleData.forEach(r => {
                if(!r.RoleID) return;
                let rankings = [];
                Object.keys(r).forEach(key => {
                    if (key.startsWith('Rank') && r[key]) rankings.push(r[key]);
                });
                roles[r.RoleID] = {
                    id: r.RoleID,
                    name: r.RoleName || r.RoleID,
                    seats: parseInt(r.SeatsAvailable) || 1,
                    rankings: rankings,
                    proposedIndex: 0,
                    matches: []
                };
            });

            let matchingComplete = false;
            let round = 1;

            // This is the core Gale-Shapley logic
            while (!matchingComplete && round < 1000) {
                matchingComplete = true; 
                let activeRoles = Object.values(roles).filter(r => r.matches.length < r.seats && r.proposedIndex < r.rankings.length);

                for (let role of activeRoles) {
                    matchingComplete = false; 
                    let candidateId = role.rankings[role.proposedIndex];
                    role.proposedIndex++; 

                    let candidate = candidates[candidateId];
                    if (!candidate) continue; 

                    let logMsg = document.createElement('div');
                    logMsg.className = 'log-entry';
                    logMsg.textContent = `[Round ${round}] ${role.name} proposes to ${candidate.name}.`;
                    logContainer.appendChild(logMsg);

                    if (!candidate.currentMatch) {
                        // Candidate is free, tentatively accepts
                        candidate.currentMatch = role.id;
                        role.matches.push(candidate.id);
                        
                        let logAcc = document.createElement('div');
                        logAcc.className = 'log-entry';
                        logAcc.innerHTML = `&nbsp;&nbsp;&rarr; ${candidate.name} is free. <strong>Tentatively accepts.</strong>`;
                        logContainer.appendChild(logAcc);
                    } else {
                        // Candidate is already matched, time to compare preferences
                        let currentMatchId = candidate.currentMatch;
                        let oldRole = roles[currentMatchId];
                        
                        let rankCurrent = candidate.preferences.indexOf(currentMatchId);
                        let rankNew = candidate.preferences.indexOf(role.id);
                        if (rankCurrent === -1) rankCurrent = 999;
                        if (rankNew === -1) rankNew = 999;

                        if (rankNew < rankCurrent) {
                            // Candidate prefers the NEW offer over the OLD offer. Swap!
                            candidate.currentMatch = role.id;
                            role.matches.push(candidate.id);
                            oldRole.matches = oldRole.matches.filter(id => id !== candidate.id);
                            
                            let logSwap = document.createElement('div');
                            logSwap.className = 'log-entry log-swap';
                            logSwap.innerHTML = `&nbsp;&nbsp;&rarr; SWAP! ${candidate.name} prefers ${role.name}. Dumps ${oldRole.name}.`;
                            logContainer.appendChild(logSwap);
                        } else {
                            // Candidate prefers their CURRENT offer and rejects the new one.
                            let logRej = document.createElement('div');
                            logRej.className = 'log-entry log-reject';
                            logRej.innerHTML = `&nbsp;&nbsp;&rarr; REJECTED. ${candidate.name} prefers their current hold (${oldRole.name}).`;
                            logContainer.appendChild(logRej);
                        }
                    }
                }
                round++;
            }

            let logEnd = document.createElement('div');
            logEnd.innerHTML = '<br><strong style="color:white;">--- ALGORITHM TERMINATED (STABLE MATCH REACHED) ---</strong>';
            logContainer.appendChild(logEnd);
            logContainer.scrollTop = logContainer.scrollHeight; // Auto-scroll to bottom

            finalCandidates = candidates;
            finalRoles = roles;
            renderResults(roles, candidates);
        }

        function renderResults(roles, candidates) {
            document.getElementById('resultsCard').style.display = 'block';
            const tbody = document.querySelector('#resultsTable tbody');
            tbody.innerHTML = '';

            Object.values(roles).forEach(role => {
                let tr = document.createElement('tr');
                let matchedNames = role.matches.map(id => candidates[id] ? candidates[id].name : id).join(', ');
                tr.innerHTML = `
                    <td><strong>${role.id}</strong></td>
                    <td>${role.name}</td>
                    <td>${matchedNames || '<span style="color:#9ca3af;">Unfilled</span>'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportResults() {
            let csvContent = "data:text/csv;charset=utf-8,CandidateID,Name,MatchedRoleID,MatchedRoleName\n";
            Object.values(finalCandidates).forEach(cand => {
                let roleId = cand.currentMatch || "UNMATCHED";
                let roleName = cand.currentMatch ? finalRoles[cand.currentMatch].name : "UNMATCHED";
                csvContent += `${cand.id},"${cand.name}",${roleId},"${roleName}"\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Final_Matches.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
