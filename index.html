<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gale-Shapley Matching Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f3f4f6; color: #1f2937; line-height: 1.5; }
        .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; }
        h1 { margin-top: 0; color: #111827; }
        h2 { border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; margin-top: 0; }
        .form-group { margin-bottom: 20px; padding: 16px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; }
        input[type="file"] { display: block; width: 100%; }
        .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #1d4ed8; }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-secondary { background: #10b981; }
        .btn-secondary:hover { background: #059669; }
        .btn-outline { background: transparent; border: 2px solid #6b7280; color: #4b5563; }
        .btn-outline:hover { background: #f3f4f6; }
        .button-group { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        .alert { font-weight: bold; padding: 12px; border-radius: 6px; margin-top: 16px; display: none; }
        .alert-error { color: #dc2626; background: #fee2e2; border: 1px solid #f87171; }
        .alert-warning { color: #854d0e; background: #fef08a; border: 1px solid #facc15; font-weight: normal; }
        .badge-warning { background: #fef08a; color: #854d0e; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .log-container { background: #1f2937; color: #10b981; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; margin-top: 24px; display: none; }
        .log-entry { margin-bottom: 4px; }
        .log-swap { color: #f59e0b; }
        .log-reject { color: #ef4444; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Gale-Shapley Matching Engine</h1>
        <p>Upload your data to run the placement algorithm.</p>
        
        <div class="form-group">
            <label>1. Candidates CSV</label>
            <input type="file" id="candidatesCsv" accept=".csv">
        </div>

        <div class="form-group">
            <label>2. Roles & Rankings CSV</label>
            <input type="file" id="rolesCsv" accept=".csv">
        </div>

        <div class="button-group">
            <button class="btn" id="runBtn" onclick="runAlgorithm()">Run Algorithm</button>
            <button class="btn btn-outline" onclick="resetEngine()">Reset Engine</button>
        </div>

        <div id="errorMessage" class="alert alert-error"></div>
        <div id="warningMessage" class="alert alert-warning"></div>
        
        <div id="auditLog" class="log-container"></div>
    </div>

    <div class="card" id="resultsCard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h2>Match Results</h2>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span id="lastUpdated" style="font-size: 13px; color: #6b7280; font-weight: bold;"></span>
                <button class="btn btn-outline" style="padding: 8px 16px; font-size: 14px;" onclick="exportAuditLog()">Download Log (.txt)</button>
                <button class="btn btn-secondary" onclick="exportResults()">Download Matches (.csv)</button>
            </div>
        </div>
        
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Role ID</th>
                    <th>Role Name</th>
                    <th>Matched Candidate(s)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h2 style="margin-top: 40px;">Unmatched Candidates</h2>
        <ul id="unmatchedList" style="line-height: 1.8;"></ul>
    </div>

    <script>
        let finalCandidates = {};
        let finalRoles = {};
        let rawAuditLogText = [];

        function parseFile(file) {
            return new Promise((resolve, reject) => {
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (err) => reject(err.message)
                });
            });
        }

        function resetEngine() {
            document.getElementById('candidatesCsv').value = "";
            document.getElementById('rolesCsv').value = "";
            document.getElementById('resultsCard').style.display = 'none';
            document.getElementById('auditLog').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('warningMessage').style.display = 'none';
            finalCandidates = {};
            finalRoles = {};
            rawAuditLogText = [];
        }

        async function runAlgorithm() {
            const runBtn = document.getElementById('runBtn');
            const errDiv = document.getElementById('errorMessage');
            const warnDiv = document.getElementById('warningMessage');
            const logContainer = document.getElementById('auditLog');

            runBtn.disabled = true;
            runBtn.textContent = "Processing...";
            errDiv.style.display = 'none';
            warnDiv.style.display = 'none';
            warnDiv.innerHTML = '';
            
            logContainer.innerHTML = '<div style="color:white; margin-bottom:8px; font-weight:bold;">--- ALGORITHM ENGINE STARTED ---</div>';
            logContainer.style.display = 'block';
            rawAuditLogText = ["--- ALGORITHM ENGINE STARTED ---"];

            const candFile = document.getElementById('candidatesCsv').files[0];
            const roleFile = document.getElementById('rolesCsv').files[0];

            if (!candFile || !roleFile) {
                errDiv.textContent = "Please upload both CSV files.";
                errDiv.style.display = 'block';
                runBtn.disabled = false;
                runBtn.textContent = "Run Algorithm";
                return;
            }

            try {
                const candData = await parseFile(candFile);
                const roleData = await parseFile(roleFile);
                executeGaleShapley(candData, roleData, logContainer, warnDiv);
            } catch (err) {
                errDiv.textContent = "System Error: " + err;
                errDiv.style.display = 'block';
            }
            
            runBtn.disabled = false;
            runBtn.textContent = "Run Algorithm";
        }

        function addToLog(container, htmlContent, plainText) {
            let div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = htmlContent;
            container.appendChild(div);
            rawAuditLogText.push(plainText);
        }

        function executeGaleShapley(candData, roleData, logContainer, warnDiv) {
            let candidates = {};
            let roles = {};
            let warnings = [];

            candData.forEach(c => {
                let idKey = Object.keys(c).find(k => k.toLowerCase().includes('candidateid') || k.toLowerCase() === 'id');
                if(!idKey || !c[idKey]) return;
                let id = String(c[idKey]).trim().toUpperCase();
                
                let prefs = [];
                Object.keys(c).forEach(k => {
                    if (k.toLowerCase().includes('pref') && c[k]) prefs.push(String(c[k]).trim().toUpperCase());
                });

                candidates[id] = { id: id, name: c.Name ? String(c.Name).trim() : id, preferences: prefs, currentMatch: null };
            });

            roleData.forEach(r => {
                let idKey = Object.keys(r).find(k => k.toLowerCase().includes('roleid') || k.toLowerCase() === 'id');
                if(!idKey || !r[idKey]) return;
                let id = String(r[idKey]).trim().toUpperCase();

                let rankings = [];
                Object.keys(r).forEach(key => {
                    if (key.trim().toLowerCase().startsWith('rank') && r[key]) {
                        rankings.push(String(r[key]).trim().toUpperCase());
                    }
                });
                
                // FUZZY SEAT SEARCH: Finds any column with "seat" in the name
                let seatKey = Object.keys(r).find(k => k.toLowerCase().includes('seat'));
                let actualSeats = seatKey ? parseInt(r[seatKey]) : 1;
                if (isNaN(actualSeats)) actualSeats = 1;

                if (rankings.length < actualSeats) {
                    warnings.push(`<strong>${id}</strong> wants ${actualSeats} seats, but only ranked ${rankings.length} candidates. It will be impossible to fill this role.`);
                }

                roles[id] = {
                    id: id,
                    name: r.RoleName ? String(r.RoleName).trim() : id,
                    seats: actualSeats,
                    rankings: rankings,
                    proposedIndex: 0,
                    matches: [] // Array holds multiple candidates for multi-seat booths
                };
            });

            if (warnings.length > 0) {
                warnDiv.innerHTML = "<strong>Data Warnings:</strong><ul>" + warnings.map(w => `<li>${w}</li>`).join('') + "</ul>";
                warnDiv.style.display = 'block';
            }

            let matchingComplete = false;
            let round = 1;

            while (!matchingComplete && round < 2000) {
                matchingComplete = true; 
                // A role is active if it has fewer matches than seats AND still has people left to ask
                let activeRoles = Object.values(roles).filter(r => r.matches.length < r.seats && r.proposedIndex < r.rankings.length);

                for (let role of activeRoles) {
                    matchingComplete = false; 
                    let candidateId = role.rankings[role.proposedIndex];
                    role.proposedIndex++; 

                    let candidate = candidates[candidateId];
                    if (!candidate) continue; 

                    addToLog(logContainer, `[Round ${round}] ${role.name} proposes to ${candidate.name}.`, `[Round ${round}] ${role.name} proposes to ${candidate.name}.`);

                    if (!candidate.currentMatch) {
                        candidate.currentMatch = role.id;
                        role.matches.push(candidate.id);
                        addToLog(logContainer, `&nbsp;&nbsp;&rarr; ${candidate.name} is free. <strong>Tentatively accepts.</strong>`, `  -> ${candidate.name} is free. Tentatively accepts.`);
                    } else {
                        let currentMatchId = candidate.currentMatch;
                        let oldRole = roles[currentMatchId];
                        
                        let rankCurrent = candidate.preferences.indexOf(currentMatchId);
                        let rankNew = candidate.preferences.indexOf(role.id);
                        if (rankCurrent === -1) rankCurrent = 999;
                        if (rankNew === -1) rankNew = 999;

                        if (rankNew < rankCurrent) {
                            candidate.currentMatch = role.id;
                            role.matches.push(candidate.id);
                            // Dump the candidate from the old role's array
                            oldRole.matches = oldRole.matches.filter(id => id !== candidate.id);
                            
                            addToLog(logContainer, `&nbsp;&nbsp;&rarr; <span class="log-swap">SWAP! ${candidate.name} prefers ${role.name}. Dumps ${oldRole.name}.</span>`, `  -> SWAP! ${candidate.name} prefers ${role.name}. Dumps ${oldRole.name}.`);
                        } else {
                            addToLog(logContainer, `&nbsp;&nbsp;&rarr; <span class="log-reject">REJECTED. ${candidate.name} prefers their current hold (${oldRole.name}).</span>`, `  -> REJECTED. ${candidate.name} prefers their current hold (${oldRole.name}).`);
                        }
                    }
                }
                round++;
            }

            addToLog(logContainer, '<br><strong style="color:white;">--- ALGORITHM TERMINATED ---</strong>', '\n--- ALGORITHM TERMINATED ---');
            logContainer.scrollTop = logContainer.scrollHeight; 

            finalCandidates = candidates;
            finalRoles = roles;
            
            let now = new Date();
            document.getElementById('lastUpdated').textContent = "Last Run: " + now.toLocaleTimeString();

            renderResults(roles, candidates);
        }

        function renderResults(roles, candidates) {
            document.getElementById('resultsCard').style.display = 'block';
            const tbody = document.querySelector('#resultsTable tbody');
            tbody.innerHTML = '';

            Object.values(roles).forEach(role => {
                let tr = document.createElement('tr');
                let matchedNames = role.matches.map(id => candidates[id] ? `${candidates[id].name} (${id})` : id).join('<br>');
                
                let statusHtml = `<span style="color: #059669; font-weight:bold;">Filled (${role.matches.length}/${role.seats})</span>`;
                if (role.matches.length < role.seats) {
                    statusHtml = `<span class="badge-warning">Missing ${role.seats - role.matches.length} seat(s)</span>`;
                }

                tr.innerHTML = `
                    <td><strong>${role.id}</strong></td>
                    <td>${role.name}</td>
                    <td>${matchedNames || '<span style="color:#9ca3af; font-style:italic;">Unfilled</span>'}</td>
                    <td>${statusHtml}</td>
                `;
                tbody.appendChild(tr);
            });

            const unmatchedList = document.getElementById('unmatchedList');
            unmatchedList.innerHTML = '';
            let unmatchedCount = 0;
            
            Object.values(candidates).forEach(cand => {
                if (!cand.currentMatch) {
                    unmatchedCount++;
                    let li = document.createElement('li');
                    li.innerHTML = `<strong>${cand.name}</strong> (${cand.id})`;
                    unmatchedList.appendChild(li);
                }
            });

            if (unmatchedCount === 0) unmatchedList.innerHTML = '<li><span style="color:#059669; font-weight:bold;">All matched!</span></li>';
        }

        function exportResults() {
            let csvContent = "CandidateID,Name,MatchedRoleID,MatchedRoleName\n";
            Object.values(finalCandidates).forEach(cand => {
                let roleId = cand.currentMatch || "UNMATCHED";
                let roleName = cand.currentMatch ? finalRoles[cand.currentMatch].name : "UNMATCHED";
                let safeName = `"${cand.name.replace(/"/g, '""')}"`;
                let safeRoleName = `"${roleName.replace(/"/g, '""')}"`;
                csvContent += `${cand.id},${safeName},${roleId},${safeRoleName}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Final_Matches.csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
